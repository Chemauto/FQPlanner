active_backend: "mujoco_3dgs"

# Robot selection: "xlerobot" (default) or "BlueThink"
robot: "xlerobot"

backends:
  mujoco:
    enabled: 1
    provide_state: 1
    accept_action: 1
    required: 1
    url: "http://127.0.0.1:5001"
    timeout: 120
    launch_hint: "serve/main.py"

  mujoco_3dgs:
    enabled: 1
    provide_state: 1
    accept_action: 1
    required: 1
    url: "http://127.0.0.1:5002"
    timeout: 120
    launch_hint: "serve_3dgs/main.py"

  isaacsim:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0
    url: "http://127.0.0.1:5101"
    timeout: 120

  gazebo:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0
    url: "http://127.0.0.1:5201"
    timeout: 120

  real:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0

navigation:
  enabled: 1
  backend: "nav2"
  url: "http://127.0.0.1:5102"
  timeout: 120

# Policy inference services (standalone processes)
policy_services:
  act:
    enabled: 1
    url: "http://127.0.0.1:5003"
    # launch_hint: "services/act_server.py --policy-path <checkpoint> --port 5003"
  diffusion_policy:
    enabled: 0
    url: "http://127.0.0.1:5004"
  pi0:
    enabled: 0
    url: "http://127.0.0.1:5005"
