backends:
  mujoco:
    enabled: 1
    provide_state: 1
    accept_action: 1
    required: 0
    url: "http://127.0.0.1:5001"
    timeout: 300  # MuJoCo nav 单步慢、发现机制串多个 nav,给 HTTP 客户端留足等待余量
    launch_hint: "serve/main.py"

  isaacsim:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0
    url: "http://127.0.0.1:5101"
    timeout: 120

  gazebo:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0
    url: "http://127.0.0.1:5201"
    timeout: 120

  real:
    enabled: 0
    provide_state: 0
    accept_action: 0
    required: 0

  # 后端开关:跑 ALFWorld bench → alfworld.enabled=1 + mujoco.enabled=0(当前)
  #          跑 MuJoCo  仿真  → mujoco.enabled=1  + alfworld.enabled=0
  # slaver 工具按"第一个 enabled"路由,所以两者只能开一个。
  alfworld:
    enabled: 0
    provide_state: 1
    accept_action: 1
    required: 1
    url: "http://127.0.0.1:5301"
    timeout: 120
    launch_hint: "serve_alfworld/main.py"
