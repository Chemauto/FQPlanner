# 物体放置目标点配置
# 当机械臂末端距离目标点 < snap_threshold 时，物体直接瞬移到目标位置
#
# 参数说明:
#   target:    目标位置 [x, y, z]（世界坐标，需要根据实际场景调整）
#   snap_threshold: 瞬移触发距离（米），默认 0.3
#
# pot:
#   target: [0.0, 0.0, 0.5]       # TODO: 根据实际场景调整
#   snap_threshold: 0.3

# cup:
#   target: [0.0, 0.0, 0.5]       # TODO: 根据实际场景调整
#   snap_threshold: 0.3

# 提示：运行 env 后可通过以下方式获取家具表面坐标来确定目标点:
#   env.sim.data.body_xpos[env.fixture_body_ids["fixture_name"]]

pot:
  target: [0.0, 0.0, 0.5]       # TODO: 根据实际场景调整
  snap_threshold: 0.3

