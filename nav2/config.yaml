# nav2/config.yaml - 地图生成与工作点配置

# 机器人尺寸信息
robot:
  name: "PandaOmron"           # Franka Panda 机械臂 + Omron 移动底盘
  base_length: 0.58            # 底盘长度 (米)
  base_width: 0.38             # 底盘宽度 (米)
  base_radius: 0.35            # 底盘外接圆半径 (米)，用于碰撞避障
  arm_max_reach: 1.0           # 机械臂最大可达距离 (米)
  arm_mount_height: 0.8        # 机械臂安装高度 (米)

# 地图生成参数 (map_generator.py)
map:
  resolution: 0.05          # 栅格分辨率 (米/像素)
  inflate_radius: 0.0       # 障碍物膨胀半径 (米)
  clear_robot_radius: 0.0   # 清理机器人初始位置半径 (米)
  shrink_footprints: 0.2    # 收缩家具 footprint (米)
  output_dir: "maps"

# 可通行点提取参数 (free_points_generator.py)
free_points:
  map_file: "maps/kitchen_map.yaml"
  output: "maps/free_points.json"
  spacing: 0.3             # 采样间距 (米)
  clearance: 0.35           # 最小离障碍距离 (米)

# 工作点选择参数 (workpoints_generator.py)
waypoints:
  free_points_path: "maps/free_points.json"
  output_path: "../serve/scene/config/waypoints.yaml"
  max_reach: 1.0            # 机械臂最大可达距离 (米)
  min_dist: 0.3             # 距家具最小安全距离 (米)
  must_cover:               # 必须覆盖的家具
    - counter
    - island
    - stove
    - sink
  fixtures:                 # 家具名映射 (简名 → 仿真 fixture key)
    counter: "counter_1_main_group"
    island: "island_island_group"
    stove: "stovetop_main_group"
    sink: "sink_island_group"
