<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>FQPlanner 任务控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; font-size: 22px; color: #38bdf8; }
        .subtitle { text-align: center; margin-bottom: 28px; font-size: 13px; color: #64748b; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 15px; color: #94a3b8; margin-bottom: 14px; }
        .input-group { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #38bdf8; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .btn-primary { background: #0ea5e9; color: #fff; }
        .btn-primary:hover { background: #0284c7; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-outline:hover { border-color: #64748b; color: #e2e8f0; }
        .btn-sm { padding: 8px 14px; font-size: 13px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .result { margin-top: 14px; padding: 14px; background: #0f172a; border-radius: 8px; white-space: pre-wrap; font-size: 13px; font-family: monospace; display: none; max-height: 400px; overflow-y: auto; }
        .status-bar { display: flex; gap: 16px; justify-content: center; font-size: 13px; color: #64748b; margin-bottom: 20px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot.ok { background: #22c55e; }
        .dot.err { background: #ef4444; }
        .msg { padding: 10px 14px; border-radius: 8px; margin-top: 10px; font-size: 13px; display: none; }
        .msg-ok { background: #052e16; color: #4ade80; border: 1px solid #166534; }
        .msg-err { background: #2a1215; color: #f87171; border: 1px solid #7f1d1d; }
        .tools-list { margin-top: 10px; }
        .tool-item { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .tool-name { color: #38bdf8; font-weight: bold; font-size: 14px; }
        .tool-desc { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .tool-params { color: #64748b; font-size: 12px; margin-top: 6px; font-family: monospace; }
        .param-tag { background: #334155; padding: 2px 8px; border-radius: 4px; margin-right: 4px; }
        .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
        .scene-card { background: #0f172a; border-radius: 8px; padding: 12px; }
        .scene-name { color: #38bdf8; font-weight: bold; font-size: 14px; }
        .scene-type { color: #64748b; font-size: 12px; margin-left: 6px; }
        .scene-desc { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .scene-contains { color: #a78bfa; font-size: 12px; margin-top: 6px; font-family: monospace; }
        .scene-coords { color: #64748b; font-size: 11px; margin-top: 4px; font-family: monospace; }
        .update-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .update-row select { padding: 8px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 13px; outline: none; }
        .update-row select:focus { border-color: #38bdf8; }
        .task-progress { margin-top: 14px; }
        .task-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .task-progress-header span { font-size: 13px; color: #94a3b8; }
        .task-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
        .task-bar-fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width 0.3s, background 0.3s; }
        .task-bar-fill.fail { background: #ef4444; }
        .task-progress-header .status-ok  { color: #4ade80; }
        .task-progress-header .status-fail { color: #f87171; }
        .task-progress-header .status-run  { color: #94a3b8; }
        .subtask-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #0f172a; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
        .subtask-item.done { opacity: 0.7; }
        .subtask-item .check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #475569; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: bold; line-height: 1; }
        .subtask-item .subtask-text { flex: 1; color: #e2e8f0; }
        .subtask-item.done.ok .subtask-text { text-decoration: line-through; color: #64748b; }
        .subtask-item.done.fail .subtask-text { color: #f87171; font-weight: 500; }
        .subtask-item .subtask-robot { color: #64748b; font-size: 12px; }
        .no-task { color: #64748b; font-size: 13px; margin-top: 10px; }
        .exp-card { display: none; margin-top: 16px; padding: 16px; background: #1a2744; border: 1px solid #38bdf8; border-radius: 10px; }
        .exp-card h3 { font-size: 14px; color: #38bdf8; margin-bottom: 10px; }
        .exp-card p { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
        .exp-card textarea { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 13px; resize: vertical; min-height: 60px; outline: none; margin-bottom: 10px; }
        .exp-card textarea:focus { border-color: #38bdf8; }
        .exp-btns { display: flex; gap: 8px; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .robot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .robot-info-box { background: #0f172a; border-radius: 8px; padding: 12px; }
        .robot-info-box h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
        .robot-coord { font-family: monospace; font-size: 14px; color: #22c55e; }
        .robot-yaw { font-family: monospace; font-size: 14px; color: #38bdf8; }
        .robot-objects { margin-top: 10px; background: #0f172a; border-radius: 8px; padding: 12px; }
        .robot-objects h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
        .obj-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; font-family: monospace; border-bottom: 1px solid #1e293b; }
        .obj-row:last-child { border-bottom: none; }
        .obj-name { color: #38bdf8; }
        .obj-pos { color: #94a3b8; }
        .obj-grasped { color: #f59e0b; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FQPlanner 任务控制台</h1>
        <div class="subtitle">Master-Slaver 机器人协作系统</div>

        <div class="status-bar" id="status"></div>

        <!-- 机器人实时坐标 -->
        <div class="card">
            <h2>机器人坐标 <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px;float:right" onclick="loadRobotStatus()">刷新</button></h2>
            <div id="robot-status-content">
                <div style="color:#64748b;font-size:13px">加载中...</div>
            </div>
        </div>

        <!-- 视频录制 -->
        <div class="card">
            <h2>视频录制</h2>
            <div class="btn-row" style="justify-content:center">
                <button class="btn btn-sm" id="btn-record" style="background:#dc2626;color:#fff" onclick="toggleRecord()">开始录制</button>
            </div>
            <div id="record-info" style="text-align:center;font-size:12px;color:#64748b;margin-top:6px"></div>
        </div>

        <!-- 四宫格相机(head+左右腕+overhead)时间线回放 -->
        <div class="card">
            <h2>四宫格相机
                <span style="font-size:12px;color:#64748b;font-weight:normal">(head + 左右腕 + overhead 拼图)</span>
                <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px;float:right" onclick="loadTimeline()">刷新时间线</button>
            </h2>
            <div class="btn-row" style="justify-content:center;margin-bottom:8px">
                <button class="btn btn-sm" id="btn-quad-live" onclick="toggleQuadLive()">▶ 实时四宫格</button>
            </div>
            <div id="quad-meta" style="text-align:center;font-size:12px;color:#64748b;margin-bottom:6px"></div>
            <div style="text-align:center">
                <img id="quad-img" style="max-width:100%;border-radius:8px;background:#0f172a;min-height:120px" alt="四宫格">
            </div>
            <div id="timeline-controls" style="margin-top:10px;display:none">
                <input type="range" id="timeline-slider" min="0" max="0" value="0" style="width:100%" oninput="showFrame(this.value)">
                <div class="btn-row" style="justify-content:center;margin-top:6px">
                    <button class="btn btn-sm btn-outline" onclick="stepFrame(-1)">◀ 上一帧</button>
                    <button class="btn btn-sm" id="btn-play" onclick="playTimeline()">⏵ 播放</button>
                    <button class="btn btn-sm btn-outline" onclick="stepFrame(1)">下一帧 ▶</button>
                </div>
                <div id="frame-label" style="text-align:center;font-size:13px;color:#e2e8f0;margin-top:6px"></div>
            </div>
            <div id="timeline-empty" style="text-align:center;font-size:12px;color:#64748b;margin-top:6px"></div>
        </div>

        <!-- 任务发布 -->
        <div class="card">
            <h2>发布任务</h2>
            <div class="input-group">
                <input type="text" id="task" placeholder="输入任务，如：前往卧室" autofocus>
                <button class="btn btn-primary" id="btn-send" onclick="sendTask()">发送</button>
            </div>
            <div class="result" id="task-result"></div>
            <div class="task-progress" id="task-progress"></div>
            <div class="btn-row" style="margin-top:10px">
                <button class="btn btn-outline btn-sm" onclick="refreshTaskStatus()">刷新任务进度</button>
            </div>
            <!-- 失败经验弹窗 -->
            <div class="exp-card" id="exp-card-fail" style="border-color:#ef4444">
                <h3 style="color:#f87171">⚠ 任务失败 — 请描述失败原因或经验教训</h3>
                <p id="exp-fail-info" style="color:#64748b;margin-bottom:10px"></p>
                <textarea id="exp-fail-note" placeholder="例如：移动时若手上有物体，应将手臂举高，避免撞到其他物体。&#10;LLM 会自动判断归入哪个技能文件（navigate / grasp / place / multi_step）。"></textarea>
                <div class="exp-btns">
                    <button class="btn btn-sm btn-danger" id="btn-fail-submit" onclick="submitFailureExp()">提交经验</button>
                    <button class="btn btn-sm btn-outline" onclick="dismissFailExp()">跳过</button>
                </div>
            </div>
            <!-- 成功经验弹窗 -->
            <div class="exp-card" id="exp-card-ok" style="border-color:#22c55e">
                <h3 style="color:#4ade80">✓ 任务完成 — 是否总结一条经验？（可选）</h3>
                <p id="exp-ok-info" style="color:#64748b;margin-bottom:10px"></p>
                <textarea id="exp-ok-note" placeholder="可选：描述这次任务中有效的操作策略，LLM 会自动归入相应技能文件。&#10;直接点「跳过」也可以。"></textarea>
                <div class="exp-btns">
                    <button class="btn btn-sm btn-success" id="btn-ok-submit" onclick="submitSuccessExp()">提交经验</button>
                    <button class="btn btn-sm btn-outline" onclick="dismissOkExp()">跳过</button>
                </div>
            </div>
        </div>

        <!-- 配置校验 -->
        <div class="card">
            <h2>配置校验</h2>
            <button class="btn btn-outline btn-sm" onclick="validateConfig()">校验配置</button>
            <div class="msg" id="validate-msg"></div>
        </div>

        <!-- 工具列表 -->
        <div class="card">
            <h2>已注册工具</h2>
            <button class="btn btn-outline btn-sm" onclick="loadTools()">刷新</button>
            <div class="tools-list" id="tools-list"></div>
        </div>

        <!-- 场景状态 -->
        <div class="card">
            <h2>场景状态</h2>
            <div class="btn-row">
                <button class="btn btn-outline btn-sm" onclick="loadScene()">刷新</button>
            </div>
            <div class="scene-grid" id="scene-grid"></div>
            <div class="update-row">
                <select id="scene-location"><option value="">选择位置</option></select>
                <select id="scene-action">
                    <option value="add_object">添加物体</option>
                    <option value="remove_object">移除物体</option>
                </select>
                <input type="text" id="scene-object" placeholder="物体名称" style="width:140px">
                <button class="btn btn-primary btn-sm" onclick="updateScene()">更新</button>
            </div>
            <div class="msg" id="scene-msg"></div>
        </div>
    </div>

    <script>
        // 状态检测
        async function checkStatus() {
            try {
                await fetch('http://127.0.0.1:5000/system_status');
                document.getElementById('status').innerHTML = '<span><span class="dot ok"></span>Master 在线</span>';
            } catch {
                document.getElementById('status').innerHTML = '<span><span class="dot err"></span>Master 离线</span>';
            }
        }
        checkStatus();
        setInterval(checkStatus, 5000);

        function showMsg(id, ok, text) {
            const el = document.getElementById(id);
            el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
            el.textContent = text;
            el.style.display = 'block';
        }

        // 发布任务
        async function sendTask() {
            const task = document.getElementById('task').value.trim();
            if (!task) return;
            const btn = document.getElementById('btn-send');
            const result = document.getElementById('task-result');
            btn.disabled = true;
            btn.textContent = '发送中...';
            result.style.display = 'block';
            result.textContent = '等待响应...';
            try {
                const resp = await fetch('/publish_task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task: task})
                });
                const data = await resp.json();
                result.textContent = JSON.stringify(data, null, 2);
                // 发送成功后立即开始轮询任务进度
                if (data.status === 'success') {
                    failDismissed = false; okDismissed = false;
                    document.getElementById('exp-card-fail').style.display = 'none';
                    document.getElementById('exp-card-ok').style.display = 'none';
                    startTaskPolling();
                }
            } catch (e) {
                result.textContent = '请求失败: ' + e.message;
            }
            btn.disabled = false;
            btn.textContent = '发送';
            document.getElementById('task').value = '';
        }
        document.getElementById('task').addEventListener('keydown', e => { if (e.key === 'Enter') sendTask(); });

        // 任务进度
        let taskPollingTimer = null;

        function renderTaskProgress(data) {
            const el = document.getElementById('task-progress');
            if (!data.active) {
                el.innerHTML = '<div class="no-task">暂无执行中的任务</div>';
                return;
            }
            const pct = data.total > 0 ? Math.round(data.completed / data.total * 100) : 0;
            const taskName = Array.isArray(data.task) ? data.task[0] : (data.task || '');
            const anyFailed = data.failed || data.subtask_list.some(
                t => t.done && t.status && t.status !== 'success'
            );
            // ALFWorld ground-truth result (won=true/false) overrides subtask-level heuristic
            const wonSignal = data.hasOwnProperty('won') ? data.won : null;
            let statusLabel, statusCls;
            if (data.all_done) {
                if (wonSignal === true) {
                    statusLabel = '✓ 任务成功 (ALFWorld verified)';
                    statusCls = 'status-ok';
                } else if (wonSignal === false) {
                    statusLabel = '✕ 任务失败 (ALFWorld verified)';
                    statusCls = 'status-fail';
                } else if (anyFailed) {
                    statusLabel = '✕ 任务失败未完成';
                    statusCls = 'status-fail';
                } else {
                    statusLabel = '✓ 全部完成';
                    statusCls = 'status-ok';
                }
            } else {
                statusLabel = '执行中...';
                statusCls = 'status-run';
            }
            const barCls = anyFailed ? 'task-bar-fill fail' : 'task-bar-fill';
            let html = `<div class="task-progress-header">
                <span>${taskName} (${data.completed}/${data.total})</span>
                <span class="${statusCls}">${statusLabel}</span>
            </div>
            <div class="task-bar"><div class="${barCls}" style="width:${pct}%"></div></div>`;

            for (const t of data.subtask_list) {
                const failed = t.done && t.status && t.status !== 'success';
                const cls = t.done ? (failed ? 'done fail' : 'done ok') : '';
                let checkStyle = 'border-color:#475569;';
                let checkIcon = '';
                if (t.done) {
                    if (failed) {
                        checkStyle = 'background:#ef4444;border-color:#ef4444;color:#fff;';
                        checkIcon = '✕';
                    } else {
                        checkStyle = 'background:#22c55e;border-color:#22c55e;color:#fff;';
                        checkIcon = '✓';
                    }
                }
                html += `<div class="subtask-item ${cls}">
                    <div class="check" style="${checkStyle}">${checkIcon}</div>
                    <span class="subtask-text">${t.subtask}</span>
                    <span class="subtask-robot">${t.robot_name}</span>
                </div>`;
            }
            el.innerHTML = html;
            if (data.all_done) { failDismissed = false; okDismissed = false; }
        }

        async function refreshTaskStatus() {
            try {
                const resp = await fetch('/api/task_status');
                const data = await resp.json();
                renderTaskProgress(data);
                if (data.active && !data.all_done) {
                    // 只在没启动轮询时才启动（手动刷新按钮触发时需要）
                    if (!taskPollingTimer) startTaskPolling();
                } else {
                    stopTaskPolling();
                }
            } catch (e) {
                document.getElementById('task-progress').innerHTML = '<div class="no-task">查询失败</div>';
            }
        }

        function startTaskPolling() {
            stopTaskPolling();
            refreshTaskStatus();
            taskPollingTimer = setInterval(refreshTaskStatus, 3000);
        }

        function stopTaskPolling() {
            if (taskPollingTimer) {
                clearInterval(taskPollingTimer);
                taskPollingTimer = null;
            }
        }

        // ── 经验弹窗 ──────────────────────────────────────────────────────
        let failDismissed = false, okDismissed = false;

        // 失败弹窗
        async function pollFailurePending() {
            try {
                const resp = await fetch('/api/failure_pending');
                const data = await resp.json();
                if (data.pending && !failDismissed) showFailureCard(data);
            } catch (e) {}
        }
        function showFailureCard(data) {
            if (document.getElementById('exp-card-fail').style.display === 'block') return;
            document.getElementById('exp-fail-info').textContent =
                `任务：${data.task_desc || ''}（${data.completed}/${data.total} 步完成后终止）`;
            document.getElementById('exp-fail-note').value = '';
            document.getElementById('exp-card-fail').style.display = 'block';
        }
        function dismissFailExp() {
            failDismissed = true;
            document.getElementById('exp-card-fail').style.display = 'none';
            fetch('/api/save_failure_experience', {method:'POST',
                headers:{'Content-Type':'application/json'},body:JSON.stringify({note:''})}).catch(()=>{});
        }
        async function submitFailureExp() {
            const note = document.getElementById('exp-fail-note').value.trim();
            const btn = document.getElementById('btn-fail-submit');
            btn.disabled = true; btn.textContent = '提交中…';
            try {
                const r = await fetch('/api/save_failure_experience', {method:'POST',
                    headers:{'Content-Type':'application/json'},body:JSON.stringify({note})});
                const res = await r.json();
                if (res.success && res.skill) {
                    btn.textContent = `已存入 ${res.skill}.md`;
                    setTimeout(() => { document.getElementById('exp-card-fail').style.display='none';
                        failDismissed=false; btn.disabled=false; btn.textContent='提交经验'; }, 1500);
                    return;
                }
            } catch(e) {}
            document.getElementById('exp-card-fail').style.display = 'none';
            failDismissed = false; btn.disabled = false; btn.textContent = '提交经验';
        }

        // 成功弹窗
        async function pollSuccessPending() {
            try {
                const resp = await fetch('/api/success_pending');
                const data = await resp.json();
                if (data.pending && !okDismissed) showSuccessCard(data);
            } catch (e) {}
        }
        function showSuccessCard(data) {
            if (document.getElementById('exp-card-ok').style.display === 'block') return;
            document.getElementById('exp-ok-info').textContent =
                `任务：${data.task_desc || ''}（${data.completed}/${data.total} 步全部完成）`;
            document.getElementById('exp-ok-note').value = '';
            document.getElementById('exp-card-ok').style.display = 'block';
        }
        function dismissOkExp() {
            okDismissed = true;
            document.getElementById('exp-card-ok').style.display = 'none';
            fetch('/api/save_success_experience', {method:'POST',
                headers:{'Content-Type':'application/json'},body:JSON.stringify({note:''})}).catch(()=>{});
        }
        async function submitSuccessExp() {
            const note = document.getElementById('exp-ok-note').value.trim();
            const btn = document.getElementById('btn-ok-submit');
            btn.disabled = true; btn.textContent = '提交中…';
            try {
                const r = await fetch('/api/save_success_experience', {method:'POST',
                    headers:{'Content-Type':'application/json'},body:JSON.stringify({note})});
                const res = await r.json();
                if (res.success && res.skill) {
                    btn.textContent = `已存入 ${res.skill}.md`;
                    setTimeout(() => { document.getElementById('exp-card-ok').style.display='none';
                        okDismissed=false; btn.disabled=false; btn.textContent='提交经验'; }, 1500);
                    return;
                }
            } catch(e) {}
            document.getElementById('exp-card-ok').style.display = 'none';
            okDismissed = false; btn.disabled = false; btn.textContent = '提交经验';
        }

        // 每 3 秒轮询
        setInterval(pollFailurePending, 3000);
        setInterval(pollSuccessPending, 3000);

        // 配置校验 - 自动检测
        async function validateConfig() {
            try {
                const resp = await fetch('/api/validate-config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await resp.json();
                showMsg('validate-msg', data.success, data.success ? '配置校验通过' : data.message);
            } catch (e) {
                showMsg('validate-msg', false, '请求失败: ' + e.message);
            }
        }

        // 工具列表 - 自动从 Redis 读取
        async function loadTools() {
            try {
                const resp = await fetch('/api/auto_tools');
                const data = await resp.json();
                if (!data.success) {
                    document.getElementById('tools-list').innerHTML = `<div style="color:#ef4444;font-size:13px">${data.message}</div>`;
                    return;
                }
                if (data.data.length === 0) {
                    document.getElementById('tools-list').innerHTML = '<div style="color:#64748b;font-size:13px;margin-top:10px">暂无工具，请先启动 Slaver</div>';
                    return;
                }
                document.getElementById('tools-list').innerHTML = data.data.map(t => {
                    const params = (t.parameters || []).map(p =>
                        `<span class="param-tag">${p.name}: ${t.type || p.type}</span>`
                    ).join('');
                    return `<div class="tool-item">
                        <div style="display:flex;align-items:center;gap:8px">
                            <span class="tool-name">${t.name}</span>
                            <span style="color:#64748b;font-size:12px">${t.robot}</span>
                        </div>
                        <div class="tool-desc">${t.description || '无描述'}</div>
                        ${params ? '<div class="tool-params">' + params + '</div>' : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('tools-list').innerHTML = '<div style="color:#ef4444;font-size:13px">加载失败: ' + e.message + '</div>';
            }
        }
        loadTools();
        setInterval(loadTools, 10000);

        // 场景状态
        let sceneData = {};
        async function loadScene() {
            try {
                const resp = await fetch('/api/scene_state');
                const data = await resp.json();
                if (!data.success) {
                    document.getElementById('scene-grid').innerHTML = `<div style="color:#ef4444;font-size:13px">${data.message}</div>`;
                    return;
                }
                sceneData = data.data;
                const grid = document.getElementById('scene-grid');
                const locSelect = document.getElementById('scene-location');
                const locations = [];

                grid.innerHTML = Object.entries(sceneData).filter(([k]) => k !== 'robot').map(([name, info]) => {
                    const desc = info.description || '';
                    const type = info.type || '';
                    const coords = info.position ? `(${info.position.join(', ')})` : '';
                    const contains = (info.contains || []).length > 0
                        ? info.contains.join(', ')
                        : '空';
                    return `<div class="scene-card">
                        <div><span class="scene-name">${name}</span><span class="scene-type">${type}</span></div>
                        ${desc ? '<div class="scene-desc">' + desc + '</div>' : ''}
                        <div class="scene-contains">contains: ${contains}</div>
                        ${coords ? '<div class="scene-coords">' + coords + '</div>' : ''}
                    </div>`;
                }).join('');

                // 更新下拉框
                for (const [name, info] of Object.entries(sceneData)) {
                    if (name === 'robot') continue;
                    const desc = info.description || name;
                    locations.push(`<option value="${name}">${desc} (${name})</option>`);
                }
                locSelect.innerHTML = '<option value="">选择位置</option>' + locations.join('');
            } catch (e) {
                document.getElementById('scene-grid').innerHTML = `<div style="color:#ef4444;font-size:13px">加载失败: ${e.message}</div>`;
            }
        }
        loadScene();
        setInterval(loadScene, 10000);

        // 手动更新场景
        async function updateScene() {
            const location = document.getElementById('scene-location').value;
            const action = document.getElementById('scene-action').value;
            const object = document.getElementById('scene-object').value.trim();
            if (!location || !object) {
                showMsg('scene-msg', false, '请选择位置并输入物体名称');
                return;
            }
            try {
                const resp = await fetch('/api/update_scene', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({location, action, object})
                });
                const data = await resp.json();
                showMsg('scene-msg', data.success, data.message || data.error);
                if (data.success) {
                    document.getElementById('scene-object').value = '';
                    loadScene();
                }
            } catch (e) {
                showMsg('scene-msg', false, '请求失败: ' + e.message);
            }
        }

        // 机器人实时坐标
        async function loadRobotStatus() {
            const el = document.getElementById('robot-status-content');
            try {
                const resp = await fetch('/api/robot_status');
                const data = await resp.json();
                if (data.error) {
                    el.innerHTML = `<div style="color:#ef4444;font-size:13px">${data.error}</div>`;
                    return;
                }

                const robot = data.robot || {};
                const bp = robot.base_pos || [0, 0, 0];
                const ep = robot.ee_pos || [0, 0, 0];
                const yaw = (robot.yaw || 0).toFixed(1);

                let html = `<div class="robot-grid">
                    <div class="robot-info-box">
                        <h3>底盘位置</h3>
                        <div class="robot-coord">[${bp.map(v => v.toFixed(3)).join(', ')}]</div>
                    </div>
                    <div class="robot-info-box">
                        <h3>末端位置</h3>
                        <div class="robot-coord">[${ep.map(v => v.toFixed(3)).join(', ')}]</div>
                    </div>
                </div>
                <div style="margin-top:8px;font-size:13px;color:#94a3b8">朝向: <span class="robot-yaw">${yaw}°</span></div>`;

                // 物体列表
                const objects = data.objects || {};
                const objNames = Object.keys(objects);
                if (objNames.length > 0) {
                    html += `<div class="robot-objects"><h3>物体</h3>`;
                    for (const [name, info] of Object.entries(objects)) {
                        const pos = (info.pos || []).map(v => v.toFixed(3)).join(', ');
                        const grasped = info.grasped ? '<span class="obj-grasped"> grasped</span>' : '';
                        html += `<div class="obj-row">
                            <span class="obj-name">${name}${grasped}</span>
                            <span class="obj-pos">[${pos}]</span>
                        </div>`;
                    }
                    html += `</div>`;
                }

                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = `<div style="color:#ef4444;font-size:13px">加载失败: ${e.message}</div>`;
            }
        }
        loadRobotStatus();
        setInterval(loadRobotStatus, 2000);

        // 视频录制
        let isRecording = false;
        let recordPollTimer = null;

        async function toggleRecord() {
            const btn = document.getElementById('btn-record');
            if (!isRecording) {
                // 开始录制
                try {
                    const resp = await fetch('/api/record/start', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({fps: 1})});
                    const data = await resp.json();
                    if (data.success) {
                        isRecording = true;
                        btn.textContent = '停止录制';
                        btn.style.background = '#16a34a';
                        pollRecordStatus();
                    } else {
                        alert(data.message || '启动录制失败');
                    }
                } catch (e) {
                    alert('请求失败: ' + e.message);
                }
            } else {
                // 停止录制
                btn.disabled = true;
                btn.textContent = '保存中...';
                try {
                    const resp = await fetch('/api/record/stop', {method: 'POST'});
                    const data = await resp.json();
                    if (data.success) {
                        const info = document.getElementById('record-info');
                        info.innerHTML = `<span style="color:#22c55e">已保存 ${data.frames} 帧 (${data.duration}s)</span> ` +
                            `<a href="/api/record/download/${data.filename}" style="color:#38bdf8" download>下载视频</a>`;
                    } else {
                        alert(data.message || '录制失败');
                    }
                } catch (e) {
                    alert('请求失败: ' + e.message);
                }
                isRecording = false;
                if (recordPollTimer) { clearInterval(recordPollTimer); recordPollTimer = null; }
                btn.textContent = '开始录制';
                btn.style.background = '#dc2626';
                btn.disabled = false;
            }
        }

        async function pollRecordStatus() {
            if (recordPollTimer) clearInterval(recordPollTimer);
            recordPollTimer = setInterval(async () => {
                if (!isRecording) return;
                try {
                    const resp = await fetch('/api/record/status');
                    const data = await resp.json();
                    if (data.active) {
                        document.getElementById('record-info').innerHTML =
                            `<span style="color:#f59e0b">● 录制中... ${data.frames} 帧</span>`;
                    }
                } catch (e) {}
            }, 1000);
        }

        // ── 四宫格相机(head+左右腕+overhead)：实时 + 时间线回放 ──
        let quadLiveTimer = null, tlFrames = [], tlPlayTimer = null;

        function stopQuadLive() {
            if (quadLiveTimer) { clearInterval(quadLiveTimer); quadLiveTimer = null; }
            document.getElementById('btn-quad-live').textContent = '▶ 实时四宫格';
        }
        function stopPlay() {
            if (tlPlayTimer) { clearInterval(tlPlayTimer); tlPlayTimer = null; }
            const b = document.getElementById('btn-play'); if (b) b.textContent = '⏵ 播放';
        }

        function toggleQuadLive() {
            const btn = document.getElementById('btn-quad-live');
            if (quadLiveTimer) { stopQuadLive(); return; }
            stopPlay();
            document.getElementById('timeline-controls').style.display = 'none';
            btn.textContent = '⏸ 停止实时';
            const refresh = () => {
                document.getElementById('quad-img').src = '/api/quad_latest?t=' + Date.now();
                document.getElementById('quad-meta').textContent = '实时四宫格 · ' + new Date().toLocaleTimeString();
            };
            refresh();
            quadLiveTimer = setInterval(refresh, 1500);
        }

        async function loadTimeline() {
            stopQuadLive();
            const empty = document.getElementById('timeline-empty');
            try {
                const resp = await fetch('/api/timeline');
                const data = await resp.json();
                if (!data.exists || !(data.frames || []).length) {
                    empty.textContent = '暂无时间线。先跑 bench/capture_quad_timeline.py 采集。';
                    document.getElementById('timeline-controls').style.display = 'none';
                    return;
                }
                tlFrames = data.frames;
                empty.textContent = '';
                document.getElementById('timeline-controls').style.display = 'block';
                const slider = document.getElementById('timeline-slider');
                slider.max = tlFrames.length - 1;
                slider.value = 0;
                const wonTag = data.won === true ? ' · <span style="color:#4ade80">✓完成</span>'
                             : data.won === false ? ' · <span style="color:#f87171">✗未完成</span>' : '';
                document.getElementById('quad-meta').innerHTML =
                    `任务: <b>${data.task || '?'}</b>${wonTag}` +
                    `<br><span style="font-size:11px">采集于 ${data.created || ''} · 宫格: ${(data.cameras || []).join(' / ')}</span>`;
                showFrame(0);
            } catch (e) {
                empty.textContent = '加载时间线失败: ' + e.message;
            }
        }

        function showFrame(i) {
            if (!tlFrames.length) return;
            i = Math.max(0, Math.min(tlFrames.length - 1, parseInt(i)));
            const f = tlFrames[i];
            document.getElementById('quad-img').src = '/task_timeline/' + f.file + '?t=' + Date.now();
            document.getElementById('timeline-slider').value = i;
            document.getElementById('frame-label').textContent =
                `时间点 ${i + 1}/${tlFrames.length} · ${f.label} · t=${f.t}s`;
        }

        function stepFrame(d) {
            stopPlay();
            showFrame(parseInt(document.getElementById('timeline-slider').value) + d);
        }

        function playTimeline() {
            const btn = document.getElementById('btn-play');
            if (tlPlayTimer) { stopPlay(); return; }
            if (!tlFrames.length) return;
            btn.textContent = '⏸ 暂停';
            let i = parseInt(document.getElementById('timeline-slider').value);
            if (i >= tlFrames.length - 1) i = -1;
            tlPlayTimer = setInterval(() => {
                i++;
                if (i >= tlFrames.length) { stopPlay(); return; }
                showFrame(i);
            }, 900);
        }

        loadTimeline();
    </script>
</body>
</html>
