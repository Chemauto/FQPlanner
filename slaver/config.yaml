tool:
  # Has the model undergone targeted training on tool_calls
  support_tool_calls: true
  # Tool matching configuration
  matching:
    # Maximum number of tools to match for each task
    max_tools: 3
    # Minimum similarity score threshold (0.0 to 1.0)
    min_similarity: 0.1

# Cloud Server Infos
model:
  # Model name for the cloud server
  model_select: "deepseek-chat"
  # model_select: "robobrain"

  # Number of retries for planning
  model_retry_planning: 5
  model_dict:
    # Model name for the cloud server
    cloud_model: "deepseek-chat"
    # cloud_model: "robobrain"

    # Deploy for the cloud server
    cloud_type: "default"
    # API key for the cloud server (read from .env)
    cloud_api_key: "${CLOUD_API_KEY}"
    # cloud_api_key: "EMPTY"

    # URL of the cloud server
    cloud_server: "https://api.deepseek.com/"
    # cloud_server: "http://localhost:4567/v1/"

    # Maximum number of chat messages to keep in memory
    max_chat_message: 50

# Collaborator Parameters
collaborator:
  # Hostname or IP address of the server
  host: "127.0.0.1"
  # Port number of the server
  port: 6379
  # database number
  db: 0
  # Whether clear the database on startup
  clear: false
  # Password for server
  password: 0

# Camera Parameters
camera:
  image_path: "images/"
  cameras:
    - "overhead_cam"
    - "head_cam"
    - "right_arm_cam"
    - "left_arm_cam"
  vlm:
    model: "mimo-v2.5"
    api_base: "https://api.xiaomimimo.com/v1"
    max_tokens: 1000

# Robot 
robot:
  # "local" with a fold name such as "demo_robot"
  # "remote" with URL such as "http://127.0.0.1:8000", and run the Python script 'skill.py' on the robot itself.
  call_type: local
  path: "robot"
  name: FQrobot

# Output reasoning context, time cost and other information
profiling: true

# Legacy MuJoCo simulation server key. Kept for compatibility with old code.
robocasa:
  server_url: "http://127.0.0.1:5001"
  timeout: 120

perception:
  # 学习测试台总开关:
  #   true  = 全可观测(实时调 /objects 拿精确坐标, 无学习曲线)
  #   false = 部分可观测(只用 belief=scene_state 当 location memory;
  #           planner 喂符号位置、导航触发逐工作点发现、belief 起空、漂移可检测)
  # server.py 也读这个值决定 reset_home 起空 belief / inject 不更新 belief。
  use_realtime_coords: false
  # 部分可观测下"机器人观测"用哪种感知后端(仅 use_realtime_coords:false 时生效):
  #   geometric    = 坐标真值过滤(物体最近工作点==当前工作点),无视野限制 = baseline
  #   segmentation = 渲染机器人相机分割图,只认视野里可见的物体(MuJoCo 自带,有视角/
  #                  遮挡/距离限制、无识别噪声),调 serve /visible_objects
  #   vlm          = 渲染 RGB 发 VLM(上面 camera.vlm=mimo-v2.5)识别 [待接,=原方案]
  backend: segmentation
  # segmentation/vlm 用哪个相机:head_cam(单视角=最强部分可观测)/all(head+两腕融合,真机导向减盲区)/
  #   逗号分隔自定义(如 head_cam,overhead_cam)。overhead 俯视是仿真特权,真机没有=作弊。
  camera: all
