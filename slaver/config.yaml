tool:
  # Has the model undergone targeted training on tool_calls
  support_tool_calls: true
  # Tool matching configuration
  matching:
    # Maximum number of tools to match for each task
    max_tools: 3
    # Minimum similarity score threshold (0.0 to 1.0)
    min_similarity: 0.1

# Cloud Server Infos
model:
  # Model name for the cloud server
  model_select: "deepseek-v4-pro"
  # model_select: "robobrain"

  # Number of retries for planning
  model_retry_planning: 5
  model_dict:
    # Model name for the cloud server
    cloud_model: "deepseek-v4-pro"
    # cloud_model: "robobrain"

    # Deploy for the cloud server
    cloud_type: "default"
    # API key for the cloud server (read from .env)
    cloud_api_key: "${CLOUD_API_KEY}"
    # cloud_api_key: "EMPTY"

    # URL of the cloud server
    cloud_server: "https://api.deepseek.com/v1"
    # cloud_server: "http://localhost:4567/v1/"

    # Maximum number of chat messages to keep in memory
    max_chat_message: 50

# Collaborator Parameters
collaborator:
  # Hostname or IP address of the server
  host: "127.0.0.1"
  # Port number of the server
  port: 6379
  # database number
  db: 0
  # Whether clear the database on startup
  clear: false
  # Password for server
  password: 0

# Camera Parameters
camera:
  image_path: "images/"
  cameras:
    - "overhead_cam"
    - "head_cam"
    - "right_arm_cam"
    - "left_arm_cam"
  vlm:
    model: "deepseek-v4-pro"
    api_base: "https://api.deepseek.com/v1"
    max_tokens: 1000

# Robot 
robot:
  # "local" with a fold name such as "demo_robot"
  # "remote" with URL such as "http://127.0.0.1:8000", and run the Python script 'skill.py' on the robot itself.
  call_type: local
  path: "robot"
  name: FQrobot

# Output reasoning context, time cost and other information
profiling: true

perception:
  use_realtime_coords: true  # true=调实时API, false=只用记忆
